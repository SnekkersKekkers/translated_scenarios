name: Build and Release Scenarios

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  TOOLS_REPO: SnekkersKekkers/tmgsscenariospipeline
  ASSETBUNDLES_REPO: SnekkersKekkers/original_jp_assetbundles
  DOMAIN: TMGS4

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout scripts repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: scripts

    - name: Checkout scenario tools
      uses: actions/checkout@v4
      with:
        repository: ${{ env.TOOLS_REPO }}
        path: tools
        token: ${{ secrets.PAT_TOKEN }}

    - name: Checkout original asset bundles
      uses: actions/checkout@v4
      continue-on-error: true
      id: checkout-assetbundles
      with:
        repository: ${{ env.ASSETBUNDLES_REPO }}
        path: original_assetbundles
        token: ${{ secrets.PAT_TOKEN }}
        ref: main

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      working-directory: tools/tmgsscenariotools
      run: nuget restore TMGSScenarioTools.sln

    - name: Build Scenario Tools
      working-directory: tools/tmgsscenariotools
      run: msbuild TMGSScenarioTools.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Create output directories
      run: |
        New-Item -ItemType Directory -Force -Path "output/bytes"
        New-Item -ItemType Directory -Force -Path "output/assetbundles"

    - name: Get changed files for release notes
      id: changed-files
      shell: pwsh
      run: |
        cd scripts
        $changedFiles = git diff --name-only HEAD~1 HEAD -- '*.c' 2>$null
        if (-not $changedFiles) { $changedFiles = "Initial build - all files" }
        $changedList = $changedFiles -join "`n"
        echo "files<<EOF" >> $env:GITHUB_OUTPUT
        echo $changedList >> $env:GITHUB_OUTPUT
        echo "EOF" >> $env:GITHUB_OUTPUT

    - name: Compile ALL scripts to bytes
      shell: pwsh
      run: |
        $cliPath = "tools/tmgsscenariotools/CLI/bin/Release/TMGSScenarioCLI.exe"
        
        Write-Host "Compiling all .c files from scripts folder..."
        Write-Host "CLI: $cliPath"
        Write-Host "Source: scripts"
        Write-Host "Output: output/bytes"
        
        # Compile the entire scripts folder at once
        & $cliPath ${{ env.DOMAIN }} "scripts" "output/bytes" --force
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Compilation failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        
        # Count results
        $bytesFiles = Get-ChildItem -Path "output/bytes" -Recurse -Filter "*.bytes"
        Write-Host "Compilation complete! Generated $($bytesFiles.Count) .bytes files"

    - name: Verify compilation output
      shell: pwsh
      run: |
        $cFiles = Get-ChildItem -Path "scripts" -Recurse -Filter "*.c" | Measure-Object
        $bytesFiles = Get-ChildItem -Path "output/bytes" -Recurse -Filter "*.bytes" | Measure-Object
        
        Write-Host "Source .c files: $($cFiles.Count)"
        Write-Host "Compiled .bytes files: $($bytesFiles.Count)"
        
        if ($bytesFiles.Count -eq 0) {
          Write-Error "No .bytes files found! Compilation failed."
          exit 1
        }
        
        # List all generated files
        Get-ChildItem -Path "output/bytes" -Recurse -Filter "*.bytes" | ForEach-Object { Write-Host "  - $($_.Name)" }

    - name: Create asset bundles
      shell: pwsh
      run: |
        $assetReplacer = "tools/UnityAssetReplacer/UnityAssetReplacer.exe"
        
        if (-not (Test-Path $assetReplacer)) {
          Write-Host "UnityAssetReplacer not found at $assetReplacer"
          Write-Host "Skipping asset bundle creation. Only .bytes files will be released."
          exit 0
        }
        
        if (-not (Test-Path "original_assetbundles")) {
          Write-Host "Original asset bundles not available. Skipping asset bundle creation."
          exit 0
        }
        
        Write-Host "Creating asset bundles..."
        
        $bytesFiles = Get-ChildItem -Path "output/bytes" -Recurse -Filter "*.bytes"
        $created = 0
        $skipped = 0
        
        foreach ($bytesFile in $bytesFiles) {
          $name = $bytesFile.BaseName
          
          # Find matching original asset bundle
          $originalBundle = Get-ChildItem -Path "original_assetbundles" -Recurse -Filter "$name.assetbundle" -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if ($originalBundle) {
            $outFile = "output/assetbundles/$name.assetbundle"
            
            & $assetReplacer -b $originalBundle.FullName -m "m_Script" -i $bytesFile.FullName -o $outFile
            
            if (Test-Path $outFile) {
              $created++
              Write-Host "  Created: $name.assetbundle"
            }
          } else {
            $skipped++
          }
        }
        
        Write-Host "Asset bundle creation complete: $created created, $skipped skipped (no matching original)"

    - name: Generate release tag
      id: tag
      shell: pwsh
      run: |
        $timestamp = Get-Date -Format "yyyy.MM.dd-HHmmss"
        $shortSha = "${{ github.sha }}".Substring(0, 7)
        $tag = "v$timestamp-$shortSha"
        echo "tag=$tag" >> $env:GITHUB_OUTPUT

    - name: Create release archive
      shell: pwsh
      run: |
        Compress-Archive -Path "output/bytes/*" -DestinationPath "translated_bytes.zip" -Force
        
        $assetBundleCount = (Get-ChildItem "output/assetbundles" -Recurse -File -ErrorAction SilentlyContinue | Measure-Object).Count
        if ($assetBundleCount -gt 0) {
          Compress-Archive -Path "output/assetbundles/*" -DestinationPath "translated_assetbundles.zip" -Force
          Write-Host "Created translated_assetbundles.zip with $assetBundleCount files"
        } else {
          Write-Host "No asset bundles to archive"
        }

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Release ${{ steps.tag.outputs.tag }}
        body: |
          Automated release from commit ${{ github.sha }}
          
          **Changes in this commit:**
          ```
          ${{ steps.changed-files.outputs.files }}
          ```
        files: |
          translated_bytes.zip
          translated_assetbundles.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
