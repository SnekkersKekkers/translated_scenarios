name: Build and Release Scenarios

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all files'
        type: boolean
        default: false

env:
  TOOLS_REPO: SnekkersKekkers/tmgsscenariospipeline
  ASSETBUNDLES_REPO: SnekkersKekkers/original_jp_assetbundles
  DOMAIN: TMGS4

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout scripts repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: scripts

    - name: Checkout scenario tools
      uses: actions/checkout@v4
      with:
        repository: ${{ env.TOOLS_REPO }}
        path: tools
        token: ${{ secrets.PAT_TOKEN }}

    - name: Checkout original asset bundles
      uses: actions/checkout@v4
      continue-on-error: true
      id: checkout-assetbundles
      with:
        repository: ${{ env.ASSETBUNDLES_REPO }}
        path: original_assetbundles
        token: ${{ secrets.PAT_TOKEN }}
        ref: main

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup .NET 6.0 (for UnityAssetReplacer)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Restore NuGet packages
      working-directory: tools/tmgsscenariotools
      run: nuget restore TMGSScenarioTools.sln

    - name: Build Scenario Tools
      working-directory: tools/tmgsscenariotools
      run: msbuild TMGSScenarioTools.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Create output directories
      run: |
        New-Item -ItemType Directory -Force -Path "output/bytes"
        New-Item -ItemType Directory -Force -Path "output/assetbundles"
        New-Item -ItemType Directory -Force -Path "to_compile"

    # Restore cached bytes from previous builds
    - name: Restore cached bytes
      uses: actions/cache/restore@v4
      id: cache-restore
      with:
        path: output/bytes
        key: compiled-bytes-${{ hashFiles('scripts/**/*.c') }}
        restore-keys: |
          compiled-bytes-

    # Restore cached asset bundles from previous builds
    - name: Restore cached asset bundles
      uses: actions/cache/restore@v4
      id: cache-assetbundles-restore
      with:
        path: output/assetbundles
        key: compiled-assetbundles-${{ hashFiles('scripts/**/*.c') }}
        restore-keys: |
          compiled-assetbundles-

    - name: Determine files to compile
      id: files-to-compile
      shell: pwsh
      run: |
        $forceRebuild = "${{ inputs.force_rebuild }}" -eq "true"
        $cacheHit = "${{ steps.cache-restore.outputs.cache-hit }}" -eq "true"
        
        # Get all .c files
        $allCFiles = Get-ChildItem -Path "scripts" -Recurse -Filter "*.c" -File
        Write-Host "Total .c files in repo: $($allCFiles.Count)"
        
        $filesToCompile = @()
        $changedInCommit = @()
        
        if ($forceRebuild -or -not $cacheHit) {
          # No cache or force rebuild - compile everything
          Write-Host "Full build required (force=$forceRebuild, cache=$cacheHit)"
          $filesToCompile = $allCFiles
        } else {
          Write-Host "Cache restored - checking for changes..."
          
          # Get files changed in this commit
          $gitChanged = @()
          Push-Location scripts
          $gitOutput = git diff --name-only HEAD~1 HEAD -- '*.c' 2>$null
          Pop-Location
          if ($gitOutput) {
            $gitChanged = $gitOutput -split "`n" | Where-Object { $_ -ne "" }
          }
          Write-Host "Files changed in commit: $($gitChanged.Count)"
          
          foreach ($cFile in $allCFiles) {
            $relativePath = $cFile.FullName.Replace((Resolve-Path "scripts").Path + "\", "")
            $bytesName = $cFile.BaseName + ".bytes"
            
            # Check if .bytes exists in cache
            $bytesExists = Get-ChildItem -Path "output/bytes" -Recurse -Filter $bytesName -File -ErrorAction SilentlyContinue
            
            # Check if file was changed in this commit
            $wasChanged = $gitChanged | Where-Object { $_ -eq $relativePath -or $_ -eq $relativePath.Replace("\", "/") }
            
            if (-not $bytesExists -or $wasChanged) {
              $filesToCompile += $cFile
              if ($wasChanged) { $changedInCommit += $relativePath }
            }
          }
          
          Write-Host "Files missing from cache: $($filesToCompile.Count - $changedInCommit.Count)"
          Write-Host "Files changed in commit: $($changedInCommit.Count)"
        }
        
        Write-Host "Total files to compile: $($filesToCompile.Count)"
        
        # Copy files to compile to temp folder
        foreach ($file in $filesToCompile) {
          Copy-Item $file.FullName -Destination "to_compile/"
        }
        
        # Output for release notes
        if ($changedInCommit.Count -gt 0) {
          $changeList = $changedInCommit -join "`n"
        } else {
          $changeList = "Initial build or cache miss"
        }
        echo "changed<<EOF" >> $env:GITHUB_OUTPUT
        echo $changeList >> $env:GITHUB_OUTPUT
        echo "EOF" >> $env:GITHUB_OUTPUT
        
        echo "count=$($filesToCompile.Count)" >> $env:GITHUB_OUTPUT

    - name: Compile scripts to bytes
      shell: pwsh
      run: |
        $cliPath = "tools/tmgsscenariotools/CLI/bin/Release/TMGSScenarioCLI.exe"
        $toCompileCount = [int]"${{ steps.files-to-compile.outputs.count }}"
        
        if ($toCompileCount -eq 0) {
          Write-Host "All files already cached, nothing to compile!"
          exit 0
        }
        
        Write-Host "Compiling $toCompileCount files..."
        
        # Compile only the files that need it (--quiet for folder-based logging)
        & $cliPath ${{ env.DOMAIN }} "to_compile" "output/bytes" --force --quiet
        
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Compilation failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }
        
        Write-Host "Compilation complete!"
    # Save cache with new compiled bytes
    - name: Save compiled bytes cache
      uses: actions/cache/save@v4
      if: always()
      with:
        path: output/bytes
        key: compiled-bytes-${{ hashFiles('scripts/**/*.c') }}

    - name: Verify compilation output
      shell: pwsh
      run: |
        $cFiles = Get-ChildItem -Path "scripts" -Recurse -Filter "*.c" | Measure-Object
        $bytesFiles = Get-ChildItem -Path "output/bytes" -Recurse -Filter "*.bytes" | Measure-Object
        
        Write-Host "Source .c files: $($cFiles.Count)"
        Write-Host "Compiled .bytes files: $($bytesFiles.Count)"
        
        if ($bytesFiles.Count -eq 0) {
          Write-Error "No .bytes files found! Something went wrong."
          exit 1
        }
        
        if ($bytesFiles.Count -lt $cFiles.Count) {
          Write-Host "Warning: Some files may not have compiled. Expected $($cFiles.Count), got $($bytesFiles.Count)"
        }

    - name: Organize bytes into folders
      shell: pwsh
      run: |
        Write-Host "Organizing .bytes files into letter-based folders..."
        
        $bytesFiles = Get-ChildItem -Path "output/bytes" -Filter "*.bytes" -File
        $organized = 0
        
        foreach ($file in $bytesFiles) {
          $name = $file.BaseName
          # Extract folder prefix (e.g., "a" from "a00_07_000_00", "ss" from "ss00_01")
          if ($name -match '^([a-z]+)') {
            $folder = $matches[1]
          } else {
            $folder = "other"
          }
          
          $targetDir = "output/bytes/$folder"
          if (-not (Test-Path $targetDir)) {
            New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          }
          
          Move-Item $file.FullName -Destination "$targetDir/$($file.Name)" -Force
          $organized++
        }
        
        Write-Host "Organized $organized .bytes files into folders"
        
        # Show folder summary
        Get-ChildItem -Path "output/bytes" -Directory | ForEach-Object {
          $count = (Get-ChildItem $_.FullName -Filter "*.bytes" | Measure-Object).Count
          Write-Host "  $($_.Name): $count files"
        }

    - name: Create asset bundles
      shell: pwsh
      continue-on-error: true
      run: |
        $assetReplacer = (Resolve-Path "tools/UnityAssetReplacer/UnityAssetReplacer.exe").Path
        
        if (-not (Test-Path $assetReplacer)) {
          Write-Host "UnityAssetReplacer not found at $assetReplacer"
          Write-Host "Skipping asset bundle creation. Only .bytes files will be released."
          exit 0
        }
        
        if (-not (Test-Path "original_assetbundles")) {
          Write-Host "Original asset bundles not available. Skipping asset bundle creation."
          exit 0
        }
        
        Write-Host "Creating asset bundles (parallel processing)..."
        Write-Host "(Only for .bytes files that have a matching original .assetbundle)"
        
        # Get all available original asset bundles
        $availableBundles = @{}
        Get-ChildItem -Path "original_assetbundles" -Recurse -Filter "*.assetbundle" | ForEach-Object {
          $availableBundles[$_.BaseName] = $_.FullName
        }
        Write-Host "Found $($availableBundles.Count) original asset bundles"
        
        # Get all .bytes files
        $bytesFiles = Get-ChildItem -Path "output/bytes" -Recurse -Filter "*.bytes"
        Write-Host "Found $($bytesFiles.Count) .bytes files"
        
        # Get already cached asset bundles
        $cachedBundles = @{}
        Get-ChildItem -Path "output/assetbundles" -Recurse -Filter "*.assetbundle" -ErrorAction SilentlyContinue | ForEach-Object {
          $cachedBundles[$_.BaseName] = $true
        }
        Write-Host "Found $($cachedBundles.Count) cached asset bundles"
        
        # Build list of work items (files that need processing)
        $workItems = @()
        $skipped = 0
        $cached = 0
        
        foreach ($bytesFile in $bytesFiles) {
          $name = $bytesFile.BaseName
          $folder = if ($name -match '^([a-z]+)') { $matches[1] } else { "other" }
          
          if ($availableBundles.ContainsKey($name)) {
            if ($cachedBundles.ContainsKey($name)) {
              $cached++
            } else {
              $workItems += [PSCustomObject]@{
                Name = $name
                Folder = $folder
                BytesDir = $bytesFile.DirectoryName
                OriginalBundle = $availableBundles[$name]
              }
            }
          } else {
            $skipped++
          }
        }
        
        Write-Host "To process: $($workItems.Count) files"
        Write-Host "From cache: $cached"
        Write-Host "Skipped (no matching original): $skipped"
        
        if ($workItems.Count -eq 0) {
          Write-Host "No asset bundles to create!"
          exit 0
        }
        
        # Pre-create output directories
        $outputBase = (Resolve-Path "output/assetbundles").Path
        $workItems | ForEach-Object { $_.Folder } | Sort-Object -Unique | ForEach-Object {
          New-Item -ItemType Directory -Force -Path "$outputBase/$_" | Out-Null
        }
        
        # Process in parallel with 8 threads
        $results = $workItems | ForEach-Object -Parallel {
          $item = $_
          $assetReplacer = $using:assetReplacer
          $outputBase = $using:outputBase
          $outFile = "$outputBase/$($item.Folder)/$($item.Name).assetbundle"
          
          try {
            $null = & $assetReplacer -b $item.OriginalBundle -m "m_Script" -i $item.BytesDir -o $outFile 2>&1
            
            if (Test-Path $outFile) {
              [PSCustomObject]@{ Name = $item.Name; Success = $true; Error = $null }
            } else {
              [PSCustomObject]@{ Name = $item.Name; Success = $false; Error = "Output not created" }
            }
          } catch {
            [PSCustomObject]@{ Name = $item.Name; Success = $false; Error = $_.ToString() }
          }
        } -ThrottleLimit 8
        
        # Tally results
        $created = ($results | Where-Object { $_.Success }).Count
        $failed = ($results | Where-Object { -not $_.Success }).Count
        $failures = $results | Where-Object { -not $_.Success }
        
        # Log failures
        if ($failures.Count -gt 0) {
          Write-Host "`nFailures:"
          $failures | ForEach-Object { Write-Host "  $($_.Name): $($_.Error)" }
        }
        
        Write-Host ""
        Write-Host "Asset bundle creation complete:"
        Write-Host "  Created: $created"
        Write-Host "  From cache: $cached"
        Write-Host "  Skipped (no matching original): $skipped"
        Write-Host "  Failed: $failed"

    # Save cache with asset bundles
    - name: Save compiled asset bundles cache
      uses: actions/cache/save@v4
      if: always()
      with:
        path: output/assetbundles
        key: compiled-assetbundles-${{ hashFiles('scripts/**/*.c') }}

    - name: Generate release tag
      id: tag
      shell: pwsh
      run: |
        $timestamp = Get-Date -Format "yyyy.MM.dd-HHmmss"
        $shortSha = "${{ github.sha }}".Substring(0, 7)
        $tag = "v$timestamp-$shortSha"
        echo "tag=$tag" >> $env:GITHUB_OUTPUT

    - name: Create release archive
      shell: pwsh
      run: |
        # Create scenarios folder wrapper for proper zip structure
        New-Item -ItemType Directory -Force -Path "release/scenarios_bytes" | Out-Null
        New-Item -ItemType Directory -Force -Path "release/scenarios_assetbundles" | Out-Null
        
        # Copy bytes folders maintaining structure (a/, b/, c/, etc.)
        Get-ChildItem -Path "output/bytes" -Directory | ForEach-Object {
          Copy-Item -Recurse $_.FullName -Destination "release/scenarios_bytes/"
        }
        
        # Create bytes zip with scenarios as top-level folder
        Push-Location "release"
        Compress-Archive -Path "scenarios_bytes/*" -DestinationPath "../translated_bytes.zip" -Force
        Pop-Location
        Write-Host "Created translated_bytes.zip"
        
        # Copy and create assetbundles zip if any exist
        $assetBundleCount = (Get-ChildItem "output/assetbundles" -Recurse -File -ErrorAction SilentlyContinue | Measure-Object).Count
        if ($assetBundleCount -gt 0) {
          Get-ChildItem -Path "output/assetbundles" -Directory | ForEach-Object {
            Copy-Item -Recurse $_.FullName -Destination "release/scenarios_assetbundles/"
          }
          Push-Location "release"
          Compress-Archive -Path "scenarios_assetbundles/*" -DestinationPath "../translated_assetbundles.zip" -Force
          Pop-Location
          Write-Host "Created translated_assetbundles.zip with $assetBundleCount files"
        } else {
          Write-Host "No asset bundles to archive"
        }

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Release ${{ steps.tag.outputs.tag }}
        body: |
          Automated release from commit ${{ github.sha }}
          
          **Files compiled this run:** ${{ steps.files-to-compile.outputs.count }}
          
          **Changes in this commit:**
          ```
          ${{ steps.files-to-compile.outputs.changed }}
          ```
        files: |
          translated_bytes.zip
          translated_assetbundles.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
