name: Build and Release Scenarios

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  TOOLS_REPO: SnekkersKekkers/tmgsscenariospipeline
  ASSETBUNDLES_REPO: SnekkersKekkers/original_jp_assetbundles
  DOMAIN: TMGS4

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout scripts repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history needed to detect changes
        path: scripts

    - name: Checkout scenario tools
      uses: actions/checkout@v4
      with:
        repository: ${{ env.TOOLS_REPO }}
        path: tools
        token: ${{ secrets.PAT_TOKEN }}

    - name: Checkout original asset bundles
      uses: actions/checkout@v4
      continue-on-error: true
      id: checkout-assetbundles
      with:
        repository: ${{ env.ASSETBUNDLES_REPO }}
        path: original_assetbundles
        token: ${{ secrets.PAT_TOKEN }}
        ref: main

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      working-directory: tools/tmgsscenariotools
      run: nuget restore TMGSScenarioTools.sln

    - name: Build Scenario Tools
      working-directory: tools/tmgsscenariotools
      run: msbuild TMGSScenarioTools.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Create output directories
      run: |
        New-Item -ItemType Directory -Force -Path "output/bytes"
        New-Item -ItemType Directory -Force -Path "output/assetbundles"

    # Restore cached bytes from previous builds
    - name: Restore cached bytes
      uses: actions/cache/restore@v4
      id: cache-restore
      with:
        path: output/bytes
        key: compiled-bytes-${{ github.sha }}
        restore-keys: |
          compiled-bytes-

    - name: Get changed files since last successful build
      id: changed-files
      shell: pwsh
      run: |
        cd scripts
        
        # Check if cache was restored (means we have previous bytes)
        $cacheHit = "${{ steps.cache-restore.outputs.cache-hit }}" -eq "true"
        
        if ($cacheHit) {
          # Only get files changed in this commit
          $changedFiles = git diff --name-only HEAD~1 HEAD -- '*.c' 2>$null
          if (-not $changedFiles) {
            $changedFiles = @()
          }
          Write-Host "Cache hit - only compiling changed files"
        } else {
          # No cache - compile everything
          $changedFiles = git ls-files '*.c'
          Write-Host "No cache - compiling all files"
        }
        
        # Convert to array if single item
        if ($changedFiles -is [string]) {
          $changedFiles = @($changedFiles)
        }
        
        $changedList = $changedFiles -join "`n"
        echo "files<<EOF" >> $env:GITHUB_OUTPUT
        echo $changedList >> $env:GITHUB_OUTPUT
        echo "EOF" >> $env:GITHUB_OUTPUT
        
        $count = $changedFiles.Count
        echo "count=$count" >> $env:GITHUB_OUTPUT
        
        Write-Host "Files to compile: $count"
        Write-Host $changedList

    - name: Compile changed scripts to bytes
      shell: pwsh
      run: |
        $cliPath = "tools/tmgsscenariotools/CLI/bin/Release/TMGSScenarioCLI.exe"
        $changedCount = [int]"${{ steps.changed-files.outputs.count }}"
        
        if ($changedCount -eq 0) {
          Write-Host "No files changed, skipping compilation"
          exit 0
        }
        
        # Get list of changed files
        $changedFiles = @"
        ${{ steps.changed-files.outputs.files }}
        "@.Trim() -split "`n" | Where-Object { $_ -ne "" }
        
        Write-Host "Compiling $($changedFiles.Count) changed files..."
        
        foreach ($file in $changedFiles) {
          $fullPath = "scripts/$file"
          if (Test-Path $fullPath) {
            $fileName = [System.IO.Path]::GetFileNameWithoutExtension($file)
            $group = ($fileName -match '^([a-z]+)')[0]; $group = $matches[1]
            
            # Create temp dir for single file compilation
            $tempDir = "temp_compile"
            New-Item -ItemType Directory -Force -Path $tempDir | Out-Null
            Copy-Item $fullPath $tempDir/
            
            # Compile
            & $cliPath ${{ env.DOMAIN }} $tempDir "output/bytes" --force
            
            Remove-Item -Recurse -Force $tempDir
            
            Write-Host "Compiled: $file"
          }
        }
        
        Write-Host "Compilation complete!"

    # Save cache for next build
    - name: Save compiled bytes cache
      uses: actions/cache/save@v4
      with:
        path: output/bytes
        key: compiled-bytes-${{ github.sha }}

    - name: Verify all scripts are compiled
      shell: pwsh
      run: |
        # Count .c files vs .bytes files
        $cFiles = Get-ChildItem -Path "scripts" -Recurse -Filter "*.c" | Measure-Object
        $bytesFiles = Get-ChildItem -Path "output/bytes" -Recurse -Filter "*.bytes" | Measure-Object
        
        Write-Host "Source .c files: $($cFiles.Count)"
        Write-Host "Compiled .bytes files: $($bytesFiles.Count)"
        
        if ($bytesFiles.Count -eq 0) {
          Write-Error "No .bytes files found! Something went wrong."
          exit 1
        }

    - name: Create asset bundles
      shell: pwsh
      run: |
        $assetReplacer = "tools/UnityAssetReplacer/UnityAssetReplacer.exe"
        
        if (-not (Test-Path $assetReplacer)) {
          Write-Host "UnityAssetReplacer not found at $assetReplacer"
          Write-Host "Skipping asset bundle creation. Only .bytes files will be released."
          exit 0
        }
        
        $bytesFiles = Get-ChildItem -Path "output/bytes" -Recurse -Filter "*.bytes"
        
        foreach ($bytesFile in $bytesFiles) {
          $name = $bytesFile.BaseName
          $null = $name -match '^([a-z]+)'
          $scriptGroup = $matches[1]
          
          $originalBundle = Get-ChildItem -Path "original_assetbundles" -Recurse -Filter "$name.assetbundle" | Select-Object -First 1
          
          if ($originalBundle) {
            $outDir = "output/assetbundles/$scriptGroup"
            New-Item -ItemType Directory -Force -Path $outDir | Out-Null
            $outFile = "$outDir/$name.assetbundle"
            
            & $assetReplacer -b $originalBundle.FullName -m "m_Script" -i $bytesFile.DirectoryName -o $outFile
          }
        }

    - name: Generate release tag
      id: tag
      shell: pwsh
      run: |
        $timestamp = Get-Date -Format "yyyy.MM.dd-HHmmss"
        $shortSha = "${{ github.sha }}".Substring(0, 7)
        $tag = "v$timestamp-$shortSha"
        echo "tag=$tag" >> $env:GITHUB_OUTPUT

    - name: Create release archive
      shell: pwsh
      run: |
        Compress-Archive -Path "output/bytes/*" -DestinationPath "translated_bytes.zip" -Force
        
        if ((Get-ChildItem "output/assetbundles" -Recurse -File | Measure-Object).Count -gt 0) {
          Compress-Archive -Path "output/assetbundles/*" -DestinationPath "translated_assetbundles.zip" -Force
        }

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Release ${{ steps.tag.outputs.tag }}
        body: |
          Automated release from commit ${{ github.sha }}
          
          **Changes in this release:**
          ```
          ${{ steps.changed-files.outputs.files }}
          ```
          
          **Total compiled scenarios:** Check the zip for complete scenario set
        files: |
          translated_bytes.zip
          translated_assetbundles.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
